  feature engineering ideas, and documentation. No candidate dataset was
  uploaded to external APIs during ranking, and the final ranking executes
  completely offline without any network calls.

# ============================================================================
# Approach summary
# ============================================================================

methodology_summary: |
  Built a multi-stage AI candidate ranking pipeline. The system first validates
  candidate profiles to detect inconsistent or honeypot data such as invalid
  dates, salary inconsistencies, and profile anomalies. It then extracts
  recruiter-relevant features including AI/ML skills, LLM and NLP experience,
  semantic search expertise, production ML exposure, consulting background,
  recruiter activity, and location preferences. Hard filters remove
  non-technical, consulting-only, research-only, and low-quality profiles.
  Qualified candidates are ranked using a weighted scoring model based on
  experience, advanced AI skills, production ML, recruiter engagement,
  availability, notice period, and behavioral signals. Scores are normalized
  into the range [0,1], sorted deterministically, and the Top 100 candidates
  are exported as JSONL, CSV, and Excel files. The complete pipeline runs
  offline on CPU without external APIs.

